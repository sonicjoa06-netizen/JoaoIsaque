<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Usuário</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #f2f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 28px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        h1 {
            margin: 0 0 22px;
            text-align: center;
            font-size: 26px;
            color: #222;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 11px;
            margin-bottom: 16px;
            border: 1px solid #bbb;
            border-radius: 6px;
            font-size: 15px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            width: 100%;
            padding: 12px;
            border: 0;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .link {
            display: block;
            margin-top: 16px;
            text-align: center;
            color: #2563eb;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Cadastrar Usuário</h1>

        <form action="cadastrar.php" method="post">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" maxlength="40" required>

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" maxlength="40" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" maxlength="8">

            <label for="sexo">Sexo</label>
            <select id="sexo" name="sexo">
                <option value="">Selecione</option>
                <option value="M">Masculino</option>
                <option value="F">Feminino</option>
            </select>

            <label for="dtna">Data de nascimento</label>
            <input type="date" id="dtna" name="dtna">

            <input type="submit" value = "Cadastrar"/>
        </form>

        <a class="link" href="Listar.php">Ver usuários cadastrados</a>
    </div>

</body>
</html>
